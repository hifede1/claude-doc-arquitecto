name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manifiesto del plugin válido
        run: |
          node -e "JSON.parse(require('fs').readFileSync('plugins/doc-arquitecto/.claude-plugin/plugin.json','utf8')); console.log('plugin.json OK')"

      - name: Sin marketplace propio (anti-regresión #20)
        run: |
          if [ -e .claude-plugin/marketplace.json ]; then
            echo "ERROR: .claude-plugin/marketplace.json no debe existir en este repo. El catálogo fede-tools vive SOLO en claude-audit-tracker (issue #20); reintroducirlo colisiona el nombre de marketplace en Claude Code."; exit 1
          fi
          echo "sin marketplace propio OK"

      - name: Estructura del plugin (2 comandos)
        run: |
          test -f plugins/doc-arquitecto/commands/documentar.md
          test -f plugins/doc-arquitecto/commands/auditar-docs.md
          echo "comandos OK"

      - name: Tracker sin drift (índice de decisiones ↔ docs/decisiones/)
        run: |
          node -e "const fs=require('fs');const m=fs.readFileSync('docs/audits/claude-doc-arquitecto-tracker.html','utf8').match(/<script>([\s\S]*)<\/script>/);if(!m){console.error('sin bloque script');process.exit(1)}fs.writeFileSync('/tmp/tracker.js',m[1])"
          node --check /tmp/tracker.js
          node scripts/verify-tracker.js
